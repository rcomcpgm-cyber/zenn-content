name: Kondate Gacha Tweet

on:
  schedule:
    # 毎日12:00 JST (UTC 03:00) と 18:00 JST (UTC 09:00)
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate and post kondate tweet
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node kondate-tweet.js

      - name: Commit tweet log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kondate-tweet-log.json
          git diff --cached --quiet || git commit -m "Update kondate tweet log" && git push
